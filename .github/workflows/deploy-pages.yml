name: Deploy Pages

on:
  workflow_run:
    workflows: [Lint, Tests]
    types: [completed]
    branches: [main]

permissions:
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check all required workflows succeeded
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha;
            for (const file of ['lint.yml', 'test.yml']) {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: file,
                head_sha: sha,
                status: 'success',
              });
              if (runs.data.total_count === 0) {
                core.setFailed(`Workflow "${file}" has not succeeded for commit ${sha}`);
                return;
              }
            }
            console.log(`All required workflows succeeded for commit ${sha}`);
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
      - id: deployment
        uses: actions/deploy-pages@v4
